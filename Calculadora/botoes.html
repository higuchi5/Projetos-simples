<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>calculadora</title>
</head>
<body>

    <div class="calculator">
        <section class="screen">
            0
        </section>

        <section class="calc-buttons">
            <div class="calc-button-row">
                <button class="calc-button double"> 
                    c
                </button>
                <button class="calc-b">
                    &larr;
                </button>
                <button class="calc-b">
                    &divide;
                </button>
            </div>

            <div class="calc-button-row">
                <button class="calc-b">
                    7
                </button>
                <button class="calc-b">
                    8
                </button>
                <button class="calc-b">
                    9
                </button>
                <button class="calc-b">
                    &times;
                </button>
            </div>

            <div class="calc-button-row">
                <button class="calc-b">
                    4
                </button>
                <button class="calc-b">
                    5
                </button>
                <button class="calc-b">
                    6
                </button><button class="calc-b">
                    &minus;
                </button>
            </div>

            <div class="calc-button-row">
                <button class="calc-b">
                    1
                </button>
                <button class="calc-b">
                    2
                </button>
                <button class="calc-b">
                    3
                </button>
                <button class="calc-b">
                    &plus;
                </button>
            </div>

            <div class="calc-button-row">
                <button class="calc-b">
                    0
                </button>
                <button class="calc-b">
                    &equals;
                </button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
